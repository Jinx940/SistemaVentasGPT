services:
  - type: web
    name: sistema-ventas-gpt-backend
    runtime: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    preDeployCommand: npm run prisma:migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-ventas-gpt-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://sistema-ventas-gpt-frontend.onrender.com
      - key: WA_ENABLED
        value: "false"

  - type: web
    name: sistema-ventas-gpt-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sistema-ventas-gpt-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sistema-ventas-gpt-db
    plan: free
    region: ohio
    databaseName: sistema_ventas_gpt
    user: sistema_ventas_gpt_user
